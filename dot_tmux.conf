# Managed with Chezmoi
set -g default-terminal "xterm-256color"

# For MacOS, allows to find brew-installed tmux and other files.
# Doesn't appear to affect shell PATH.
set-environment -g PATH "$HOME/.local/bin:/opt/homebrew/bin:/usr/local/bin:/bin:/usr/bin"

# list of plugins
#set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'tmux-plugins/tmux-sensible'
#set -g @plugin 'tmux-plugins/tmux-copycat'
#set -g @plugin 'tmux-plugins/tmux-yank'
#set -g @plugin 'tmux-plugins/tmux-pain-control'
#set -g @plugin 'jaclu/tmux-power-zoom'

set -g history-file ~/.tmux/tmux_history
set-option -g history-limit 10000

# resize to smallest _active_ window
# incompatible with iterm2
#setw -g aggressive-resize on

set-option -g allow-passthrough on
set-option -g set-titles on
set-option -g set-titles-string '#T'

# Initialize tmux plugin manager
#run -b '~/.tmux/plugins/tpm/tpm'
